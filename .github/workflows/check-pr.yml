name: PR Quality Gates

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  branch-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" || "$BRANCH" == "develop" ]]; then
            echo "Skipping check for protected branch"
            exit 0
          fi
          # Conventional Branch spec: type/description
          # Types: feat|feature, fix|bugfix, hotfix, release, chore
          # Description: lowercase letters, numbers, hyphens only
          if ! echo "$BRANCH" | grep -qE '^(feat|feature|fix|bugfix|hotfix|release|chore)/[a-z0-9][a-z0-9.-]*$'; then
            echo "Branch '$BRANCH' does not follow Conventional Branch spec."
            echo "Expected format: <type>/<description>"
            echo "Allowed types: feat, feature, fix, bugfix, hotfix, release, chore"
            echo "Description: lowercase letters, numbers, hyphens, dots (no consecutive or leading/trailing hyphens/dots)"
            exit 1
          fi
          echo "Branch name is valid"
