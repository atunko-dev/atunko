# yaml-language-server: $schema=https://raw.githubusercontent.com/reqstool/reqstool-client/main/src/reqstool/resources/schemas/v1/requirements.schema.json
metadata:
  urn: atunko
  variant: system
  title: Atunko System Requirements
  url: https://github.com/atunko/atunko

implementations:
  local:
    - path: ../../atunko-core/docs/reqstool
    - path: ../../atunko-cli/docs/reqstool
    - path: ../../atunko-tui/docs/reqstool
    - path: ../../atunko-web/docs/reqstool

requirements:
  # Web UI requirements
  - id: WEB_0001
    title: Web UI Launch
    significance: shall
    description: >-
      The tool shall provide a browser-based recipe browser via CLI subcommand,
      launching an embedded Jetty server accessible on localhost
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.1
    title: Web UI — Recipe TreeGrid
    significance: shall
    description: >-
      The Web UI shall display all discovered recipes in a hierarchical tree grid,
      with composite recipes expandable to show their sub-recipes
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.2
    title: Web UI — Search and Tag Filter
    significance: shall
    description: >-
      The Web UI shall support real-time text search (name, description, tags) and
      multi-select tag filtering (OR/ANY logic), composing with AND between filters
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.3
    title: Web UI — Port Option
    significance: shall
    description: The Web UI subcommand shall accept a configurable port option, defaulting to 8080
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.4
    title: Web UI — Expand/Collapse Composite Recipes
    significance: shall
    description: >-
      The Web UI shall allow expanding and collapsing composite recipes in the tree grid
      to show or hide their sub-recipe list
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.5
    title: Web UI — Cascade Multi-Select
    significance: shall
    description: >-
      The Web UI shall support multi-select with cascade-both-ways checkbox logic:
      selecting a parent selects all children; selecting all children selects the parent;
      deselecting one child puts the parent into indeterminate state
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.6
    title: Web UI — Detail Panel
    significance: shall
    description: >-
      The Web UI shall display a detail panel showing the selected recipe's name,
      description, tags, recipe list (if composite), and options
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.7
    title: Web UI — Project Directory Option
    significance: shall
    description: >-
      The Web UI subcommand shall accept a --project-dir option specifying the target project
      directory for recipe execution, defaulting to the current working directory
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.8
    title: Web UI — Execution Services Initialisation
    significance: shall
    description: >-
      The Web UI shall initialise shared execution services (RecipeExecutionEngine,
      ProjectSourceParser, ChangeApplier) at startup via AppServices, making them
      available to all Vaadin views without duplication
    references:
      requirement_ids: ["WEB_0001"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: WEB_0001.9
    title: Web UI — Recipe Execution and Dry-Run Preview
    significance: shall
    description: >-
      The Web UI shall allow the user to execute selected recipes against the target project
      and optionally preview the resulting file changes (dry-run) before applying them
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.10
    title: Web UI — Run Order Dialog
    significance: shall
    description: >-
      The Web UI shall show a mandatory run order dialog before every recipe execution,
      with an ordered list of selected recipes, move-up/down controls for reordering,
      and a flatten-composites toggle that recursively expands composites into leaf recipes
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.11
    title: Web UI — Save Named Run Configuration
    significance: shall
    description: >-
      The Web UI shall allow saving the current recipe selection as a named run
      configuration to atunko/runs/<name>.yaml using the core RunConfigService
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.12
    title: Web UI — Load Named Run Configuration
    significance: shall
    description: >-
      The Web UI shall allow loading a saved run configuration from atunko/runs/*.yaml,
      resolving recipe names to available recipes and selecting them in the tree grid
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.13
    title: Web UI — Recipe Sorting
    significance: shall
    description: >-
      The Web UI shall provide a sort-order dropdown allowing the user to sort recipes
      by name (alphabetical) or by tags (grouped by first tag, then alphabetical)
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.14
    title: Web UI — Bulk Select and Deselect
    significance: shall
    description: >-
      The Web UI shall provide Select All and Deselect All buttons that respect active
      filters, selecting or deselecting only the currently visible recipes
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.15
    title: Web UI — Coverage Indicators
    significance: shall
    description: >-
      The Web UI shall display a visual badge on recipes that are transitively included
      in a selected composite recipe, indicating they will be executed as part of the composite
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.16
    title: Web UI — Included-In Reverse Lookup
    significance: shall
    description: >-
      The Web UI detail panel shall show which composite recipes include the selected recipe,
      displayed as an "Included in: X, Y" section
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0001.17
    title: Web UI — Export Config to Build Tool Format
    significance: should
    description: >-
      The Web UI shall allow exporting the current recipe selection as a Gradle or Maven
      plugin configuration snippet via a modal dialog, using the core ConfigExportService
    references:
      requirement_ids: ["WEB_0001", "CORE_0009"]
    categories: [compatibility]
    revision: 0.1.0

  # TUI requirements
  - id: TUI_0001
    title: TUI Launch
    significance: shall
    description: >-
      The tool shall provide an interactive TUI via CLI subcommand,
      with recipe browsing, search, selection, configuration, and execution
    categories: [interaction-capability]
    revision: 0.2.0

  - id: TUI_0001.1
    title: TUI — Recipe Table
    significance: shall
    description: The TUI shall display a scrollable table of recipes with name, description, and tags
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.2
    title: TUI — Recipe Detail Panel
    significance: shall
    description: The TUI shall show a side panel with recipe details when a recipe is highlighted
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.3
    title: TUI — Search Filter
    significance: shall
    description: The TUI shall support real-time search filtering of the recipe list
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.4
    title: TUI — Recipe Detail View
    significance: shall
    description: The TUI shall display a full-screen detail view when a recipe is selected
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.5
    title: TUI — Multi-Select
    significance: shall
    description: The TUI shall support selecting multiple recipes for batch operations
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.6
    title: TUI — Recipe Ordering
    significance: shall
    description: The TUI shall support sorting recipes by name or tags
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.7
    title: TUI — Recipe Options
    significance: shall
    description: The TUI shall allow configuring recipe options before execution
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.8
    title: TUI — Dry-Run Preview
    significance: shall
    description: The TUI shall show a preview of changes before applying recipes
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.9
    title: TUI — Recipe Execution
    significance: shall
    description: The TUI shall execute selected recipes and display results
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.10
    title: TUI — Save Run Config
    significance: shall
    description: The TUI shall support saving the current recipe setup to a portable YAML file
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.11
    title: TUI — Tag Browser
    significance: shall
    description: The TUI shall provide a tag-based browser for filtering recipes by tag
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.12
    title: TUI — Keyboard Navigation
    significance: shall
    description: The TUI shall support keyboard navigation and shortcuts for all interactions
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.13
    title: TUI — Composite Recipe Browsing
    significance: shall
    description: The TUI shall support browsing composite recipes with expand/collapse and destructive flatten
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.14
    title: TUI — Run Dialog
    significance: shall
    description: >-
      The TUI shall provide a navigable, reorderable recipe execution list with
      individual toggle, cycle selection, and composite expand/collapse/flatten
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.15
    title: TUI — Debug Logging
    significance: shall
    description: The TUI shall support writing debug output to a log file via --log-file option
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.16
    title: TUI — Recipe Coverage Indicators
    significance: shall
    description: >-
      The TUI shall visually indicate when a recipe is included by a selected
      composite, show which composites cover it in the detail panel, and allow
      the user to explicitly select a covered recipe for duplicate execution
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.17
    title: TUI — Cascade Multi-Select
    significance: shall
    description: >-
      The TUI shall support cascade-both-ways checkbox selection for composite
      recipes: selecting a composite selects all transitive sub-recipes; selecting
      all sub-recipes of a composite auto-selects the composite; deselecting any
      sub-recipe without deselecting all puts the composite in an indeterminate
      (partial) visual state
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: TUI_0001.18
    title: TUI — CSS Theming
    significance: shall
    description: >-
      The TUI shall support CSS-based theming via TamboUI TCSS stylesheets,
      shipping bundled dark and light themes, with user-provided CSS file support
      and theme selection via --theme CLI flag
    references:
      requirement_ids: ["TUI_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  # CLI requirements — list/search/run
  - id: CLI_0002
    title: CLI Recipe Listing
    significance: shall
    description: The tool shall list all available recipes via CLI subcommand, with selectable output format and sort order
    categories: [functional-suitability]
    revision: 0.2.0

  - id: CLI_0002.1
    title: List — Text Format
    significance: shall
    description: The list subcommand shall display recipes in human-readable text format
    references:
      requirement_ids: ["CLI_0002"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0002.2
    title: List — JSON Format
    significance: shall
    description: The list subcommand shall display recipes in JSON format
    references:
      requirement_ids: ["CLI_0002"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0002.3
    title: List — Sort by Name
    significance: shall
    description: The list subcommand shall support sorting recipes alphabetically by name
    references:
      requirement_ids: ["CLI_0002"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0002.4
    title: List — Sort by Tags
    significance: shall
    description: The list subcommand shall support sorting recipes by first tag, then by name
    references:
      requirement_ids: ["CLI_0002"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0003
    title: CLI Recipe Execution
    significance: shall
    description: The tool shall execute recipes via CLI subcommand
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004
    title: CLI Recipe Search
    significance: shall
    description: The tool shall search recipes by keyword via CLI subcommand, with selectable output format, sort order, and field filter
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004.1
    title: Search — Text Format
    significance: shall
    description: The search subcommand shall display matching recipes in human-readable text format
    references:
      requirement_ids: ["CLI_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004.2
    title: Search — JSON Format
    significance: shall
    description: The search subcommand shall display matching recipes in JSON format
    references:
      requirement_ids: ["CLI_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004.3
    title: Search — Sort by Name
    significance: shall
    description: The search subcommand shall support sorting matching recipes alphabetically by name
    references:
      requirement_ids: ["CLI_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004.4
    title: Search — Sort by Tags
    significance: shall
    description: The search subcommand shall support sorting matching recipes by first tag, then by name
    references:
      requirement_ids: ["CLI_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0004.5
    title: Search — Field Filter
    significance: shall
    description: The search subcommand shall support filtering which recipe fields (name, displayName, description, tags) the query matches against
    references:
      requirement_ids: ["CLI_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  # Core requirements
  - id: CORE_0001
    title: Recipe Discovery
    significance: shall
    description: The core engine shall discover all OpenRewrite recipes from the classpath
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0001.1
    title: Composite Recipe Discovery
    significance: shall
    description: The engine shall expose composite recipe structure (recipeList with sub-recipes)
    references:
      requirement_ids: ["CORE_0001"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0002
    title: Recipe Search
    significance: shall
    description: The core engine shall support searching recipes by name, description, and tags
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0003
    title: Recipe Execution
    significance: shall
    description: The core engine shall execute selected OpenRewrite recipes against a target project
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0003.1
    title: Multi-File-Type Parsing
    significance: shall
    description: >-
      The engine shall parse all OpenRewrite-supported file types (Java, XML, YAML,
      JSON, properties) from project source and resource directories
    references:
      requirement_ids: ["CORE_0003"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0004
    title: Project Scanning — Build System Auto-Detection
    significance: shall
    description: >-
      The core engine shall auto-detect which build system (Gradle, Maven) is in use for a given
      project directory and select the appropriate scanner, failing fast with a clear error if no
      recognized build files are found.
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_GRADLE_0001
    title: Gradle Project Support
    significance: shall
    description: >-
      The core engine shall resolve classpaths, source dirs, resource dirs, and test dirs
      for Gradle projects via Tooling API
    references:
      requirement_ids: ["CORE_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_MAVEN_0001
    title: Maven Project Support
    significance: shall
    description: The core engine shall resolve classpaths and source dirs for Maven projects
    references:
      requirement_ids: ["CORE_0004"]
    categories: [functional-suitability]
    revision: 0.1.0

  # CORE_0005 is intentionally vacant — was Maven Project Support, now CORE_MAVEN_0001

  - id: CORE_0006
    title: Git Integration
    significance: should
    description: The core engine should detect git repos and support stash-based versioning
    categories: [functional-suitability, safety]
    revision: 0.1.0

  - id: CORE_0007
    title: Save Run Configuration
    significance: shall
    description: The tool shall save current recipe setup to a portable YAML file (.atunko.yml)
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0008
    title: Load Run Configuration
    significance: shall
    description: The tool shall load and execute from a saved configuration file
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0009
    title: Export Configuration
    significance: should
    description: The tool should export run configs to Maven/Gradle plugin format
    categories: [compatibility]
    revision: 0.1.0

  - id: CORE_0007.1
    title: Save Run Configuration — Workspace Block
    significance: shall
    description: >-
      When saving a run configuration that includes a workspace, the tool shall include
      the workspace root and glob filters in the .atunko.yml file
    references:
      requirement_ids: ["CORE_0007"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0008.1
    title: Load Run Configuration — Workspace Block
    significance: shall
    description: >-
      When loading a run configuration, the tool shall deserialise the optional
      workspace block and make it available for workspace-mode execution
    references:
      requirement_ids: ["CORE_0008"]
    categories: [functional-suitability]
    revision: 0.1.0

  # Workspace support
  - id: CORE_0010
    title: Workspace Scanning
    significance: shall
    description: >-
      The core engine shall discover all Gradle and Maven projects under a given root
      directory by walking the directory tree top-down, returning a Workspace containing
      a list of ProjectEntry (projectDir + ProjectInfo) pairs
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0010.1
    title: Workspace Scanner — Skip Build Output Directories
    significance: shall
    description: >-
      The workspace scanner shall skip build/, target/, .gradle/, node_modules/,
      .git/, and hidden directories (names starting with .) during the tree walk
    references:
      requirement_ids: ["CORE_0010"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0010.2
    title: Workspace Scanner — .atunkoignore Marker
    significance: shall
    description: >-
      The workspace scanner shall not descend into any directory that contains
      a .atunkoignore file
    references:
      requirement_ids: ["CORE_0010"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0010.3
    title: Workspace Scanner — Gradle Multi-Project Root Handling
    significance: shall
    description: >-
      When the workspace scanner encounters a settings.gradle or settings.gradle.kts file,
      it shall parse include declarations to determine subproject directories and exclude
      those directories from further independent scanning, treating the root as a single project
    references:
      requirement_ids: ["CORE_0010"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0010.4
    title: Workspace Scanner — Maven Multi-Module Root Handling
    significance: shall
    description: >-
      When the workspace scanner encounters a pom.xml containing a <modules> block,
      it shall treat that directory as a Maven multi-module root and exclude its
      declared module directories from further independent scanning
    references:
      requirement_ids: ["CORE_0010"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0010.5
    title: ProjectEntry Type
    significance: shall
    description: >-
      The core engine shall provide a ProjectEntry record that pairs a project
      directory path with its corresponding ProjectInfo, used as the unit of
      identity throughout workspace operations
    references:
      requirement_ids: ["CORE_0010"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0011
    title: Workspace Execution
    significance: shall
    description: >-
      The core engine shall execute a named recipe sequentially across all projects
      in a Workspace, returning a WorkspaceExecutionResult containing per-project results
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0011.1
    title: Workspace Execution — Per-Project Failure Isolation
    significance: shall
    description: >-
      A failure (exception or execution error) in one project shall not abort the
      workspace execution loop; the failure shall be captured in the ProjectExecutionResult
      for that project and execution shall continue with remaining projects
    references:
      requirement_ids: ["CORE_0011"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CORE_0012
    title: Run Configuration — Workspace Block
    significance: shall
    description: >-
      The RunConfig model shall support an optional workspace block containing
      a root path and optional include/exclude glob filters; when absent, single-project
      mode is assumed
    categories: [functional-suitability]
    revision: 0.1.0

  # CLI workspace requirements
  - id: CLI_0005
    title: CLI Workspace Support
    significance: shall
    description: >-
      The run and list CLI subcommands shall accept a --workspace <dir> option that
      scans the given directory for projects and operates across all discovered projects
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0005.1
    title: CLI Workspace — Per-Project Summary Table
    significance: shall
    description: >-
      After a workspace run, the CLI shall print a per-project summary table showing
      each project name, number of changed files, and pass/fail status
    references:
      requirement_ids: ["CLI_0005"]
    categories: [functional-suitability]
    revision: 0.1.0

  - id: CLI_0005.2
    title: CLI Workspace — Non-Zero Exit on Failure
    significance: shall
    description: >-
      If any project fails during a workspace run, the CLI process shall exit with
      a non-zero exit code
    references:
      requirement_ids: ["CLI_0005"]
    categories: [functional-suitability]
    revision: 0.1.0

  # Web UI workspace requirements
  - id: WEB_0002
    title: Web UI — Workspace Scan and Multi-Select
    significance: shall
    description: >-
      The Web UI shall provide a "Scan workspace" toggle on the project-dir picker
      that scans the given directory and displays discovered projects in a multi-select list
    references:
      requirement_ids: ["WEB_0001"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0002.1
    title: Web UI — Per-Project Execution Progress
    significance: shall
    description: >-
      The Web UI execution dialog shall show per-project progress during a workspace run,
      displaying the current project name and N-of-M count
    references:
      requirement_ids: ["WEB_0002"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0002.2
    title: Web UI — Aggregate Results Table
    significance: shall
    description: >-
      After a workspace run the Web UI shall display an aggregate results table with
      a per-project row showing project name, changed file count, and pass/fail status
    references:
      requirement_ids: ["WEB_0002"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0002.3
    title: Web UI — Scoped Diff Viewer
    significance: shall
    description: >-
      The Web UI diff viewer shall scope to one project at a time with a dropdown
      to switch between projects when a workspace run has been performed
    references:
      requirement_ids: ["WEB_0002"]
    categories: [interaction-capability]
    revision: 0.1.0

  - id: WEB_0002.4
    title: Web UI — Persist Workspace Config
    significance: shall
    description: >-
      The Web UI shall persist the workspace root path in the session and run
      configuration, allowing it to be saved and reloaded via .atunko.yml
    references:
      requirement_ids: ["WEB_0002"]
    categories: [interaction-capability]
    revision: 0.1.0
