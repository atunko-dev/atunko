# yaml-language-server: $schema=https://raw.githubusercontent.com/reqstool/reqstool-client/main/src/reqstool/resources/schemas/v1/software_verification_cases.schema.json
cases:
  - id: SVC_WEB_0001
    requirement_ids: ["WEB_0001"]
    title: Web UI launches embedded server
    verification: automated-test
    description: |
      GIVEN the WebUiCommand is instantiated with a RecipeDiscoveryService
      WHEN the command is created
      THEN it can be instantiated without error
    revision: "0.1.0"

  - id: SVC_WEB_0001.1
    requirement_ids: ["WEB_0001.1"]
    title: TreeGrid displays all recipes when no filter is active
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with a set of recipes
      WHEN no search query or tag filter is applied
      THEN all recipes are displayed in the TreeGrid
    revision: "0.1.0"

  - id: SVC_WEB_0001.2
    requirement_ids: ["WEB_0001.2"]
    title: Text search and tag filter narrow the recipe list
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with a set of recipes
      WHEN a text query is entered or tags are selected in the filter
      THEN only recipes matching the query (name, description, or tags) and/or
      having at least one of the selected tags are displayed
    revision: "0.1.0"

  - id: SVC_WEB_0001.3
    requirement_ids: ["WEB_0001.3"]
    title: Default port is 8080
    verification: automated-test
    description: |
      GIVEN a WebUiCommand is created without specifying a port
      WHEN the default port value is read
      THEN it is 8080
    revision: "0.1.0"

  - id: SVC_WEB_0001.4
    requirement_ids: ["WEB_0001.4"]
    title: Composite recipes are expandable and collapsible
    verification: automated-test
    description: |
      GIVEN the TreeGrid contains a composite recipe with sub-recipes
      WHEN the user expands the composite recipe row
      THEN the sub-recipes are visible as child rows
      AND when the user collapses the row, the sub-recipes are hidden
    revision: "0.1.0"

  - id: SVC_WEB_0001.5
    requirement_ids: ["WEB_0001.5"]
    title: Cascade-both-ways checkbox selection
    verification: automated-test
    description: |
      GIVEN the TreeGrid contains a composite recipe with sub-recipes
      WHEN the parent recipe checkbox is selected
      THEN all child recipe checkboxes are also selected
      AND when all child checkboxes are selected individually
      THEN the parent checkbox becomes selected
      AND when one child checkbox is deselected
      THEN the parent checkbox becomes indeterminate
    revision: "0.1.0"

  - id: SVC_WEB_0001.6
    requirement_ids: ["WEB_0001.6"]
    title: Clicking a recipe updates the detail panel
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with recipes
      WHEN the user clicks a recipe row in the TreeGrid
      THEN the detail panel displays the recipe's name, description, tags,
      recipe list (if composite), and options
    revision: "0.1.0"

  - id: SVC_WEB_0001.7
    requirement_ids: ["WEB_0001.1"]
    title: Status bar displays current recipe count
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with recipes
      WHEN a filter is applied or the view is first loaded
      THEN the status bar shows "Showing N recipes" reflecting the current visible count
    revision: "0.1.0"

  - id: SVC_WEB_0001.8
    requirement_ids: ["WEB_0001.6"]
    title: Detail panel displays full recipe information
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with recipes
      WHEN a recipe is selected
      THEN the detail panel shows the recipe name, description, tags, and child list (if composite)
      AND when no recipe is selected, the panel shows a placeholder message
    revision: "0.1.0"

  - id: SVC_WEB_0001.9
    requirement_ids: ["WEB_0001.5"]
    title: Cascade selection handles edge cases correctly
    verification: automated-test
    description: |
      GIVEN a deep or complex recipe hierarchy (3+ levels, shared recipes appearing under multiple parents)
      WHEN a parent recipe is selected
      THEN cascade propagates to all descendants without duplication or infinite recursion
    revision: "0.1.0"

  - id: SVC_WEB_0001.10
    requirement_ids: ["WEB_0001.7"]
    title: Default project directory is current working directory
    verification: automated-test
    description: |
      GIVEN a WebUiCommand is created without specifying --project-dir
      WHEN the default project directory value is read
      THEN it is Path.of(".")
    revision: "0.1.0"

  - id: SVC_WEB_0001.11
    requirement_ids: ["WEB_0001.7"]
    title: Custom project directory is applied
    verification: automated-test
    description: |
      GIVEN a WebUiCommand is created
      WHEN --project-dir /some/path is passed as an argument
      THEN getProjectDir() returns Path.of("/some/path")
    revision: "0.1.0"

  - id: SVC_WEB_0001.12
    requirement_ids: ["WEB_0001.8"]
    title: AppServices initialised at Web UI startup
    verification: automated-test
    description: |
      GIVEN the WebUiCommand is run
      WHEN AppServices.init() is called with engine, sourceParser, and changeApplier
      THEN AppServices.getEngine(), getSourceParser(), and getChangeApplier() return the injected instances
    revision: "0.1.0"

  - id: SVC_WEB_0001.13
    requirement_ids: ["WEB_0001.9"]
    title: Web UI executes recipes and previews dry-run results
    verification: automated-test
    description: |
      GIVEN the Web UI is loaded with a project dir and selected recipes
      WHEN the user clicks Execute or Dry Run
      THEN the recipes are run (or previewed) and the resulting file changes are displayed
    revision: "0.1.0"

  - id: SVC_WEB_0001.14
    requirement_ids: ["WEB_0001.10"]
    title: Run order dialog — flatten composites
    verification: automated-test
    description: |
      GIVEN a set of selected recipes including composites
      WHEN the flatten toggle is activated in the run order dialog
      THEN composite recipes are recursively expanded into their leaf recipes with deduplication
    revision: "0.1.0"

  - id: SVC_WEB_0001.15
    requirement_ids: ["WEB_0001.10"]
    title: Run order dialog — move up and down
    verification: automated-test
    description: |
      GIVEN selected recipes are displayed in the run order dialog
      WHEN the user clicks Move Up or Move Down
      THEN the selected recipe swaps position with its neighbor
    revision: "0.1.0"

  - id: SVC_WEB_0001.16
    requirement_ids: ["WEB_0001.10"]
    title: Run order dialog — confirm triggers execution
    verification: automated-test
    description: |
      GIVEN the run order dialog is open with ordered recipes
      WHEN the user clicks Confirm
      THEN the onConfirm callback is invoked with the current recipe order
    revision: "0.1.0"

  - id: SVC_WEB_0001.17
    requirement_ids: ["WEB_0001.11"]
    title: Save run configuration — selects matching recipes on load
    verification: automated-test
    description: |
      GIVEN a RunConfig with recipe entries
      WHEN applyRunConfig is called
      THEN the matching recipes are selected in the tree grid
    revision: "0.1.0"

  - id: SVC_WEB_0001.18
    requirement_ids: ["WEB_0001.12"]
    title: Load run configuration — ignores unknown recipes
    verification: automated-test
    description: |
      GIVEN a RunConfig containing recipe names not in the current recipe list
      WHEN applyRunConfig is called
      THEN unknown recipes are silently skipped and known recipes are selected
    revision: "0.1.0"

  - id: SVC_WEB_0001.19
    requirement_ids: ["WEB_0001.12"]
    title: Load run configuration — resolves child recipe names
    verification: automated-test
    description: |
      GIVEN a RunConfig with a recipe name that is a child of a composite
      WHEN applyRunConfig is called
      THEN the child recipe is found via recursive lookup and selected
    revision: "0.1.0"

  - id: SVC_WEB_0001.20
    requirement_ids: ["WEB_0001.13"]
    title: Sort by name orders alphabetically
    verification: automated-test
    description: |
      GIVEN a list of recipes in arbitrary order
      WHEN sort order is set to NAME
      THEN recipes are displayed in alphabetical order by fully qualified name
    revision: "0.1.0"

  - id: SVC_WEB_0001.21
    requirement_ids: ["WEB_0001.13"]
    title: Sort by tags groups by first tag
    verification: automated-test
    description: |
      GIVEN a list of recipes with different tags
      WHEN sort order is set to TAGS
      THEN recipes are grouped by their first tag alphabetically, then by name within each group
    revision: "0.1.0"

  - id: SVC_WEB_0001.22
    requirement_ids: ["WEB_0001.14"]
    title: Select All selects all visible recipes
    verification: automated-test
    description: |
      GIVEN a filtered or unfiltered recipe list
      WHEN Select All is clicked
      THEN all currently visible recipes are selected
    revision: "0.1.0"

  - id: SVC_WEB_0001.23
    requirement_ids: ["WEB_0001.14"]
    title: Deselect All clears all selections
    verification: automated-test
    description: |
      GIVEN one or more recipes are selected
      WHEN Deselect All is clicked
      THEN no recipes remain selected
    revision: "0.1.0"

  - id: SVC_WEB_0001.24
    requirement_ids: ["WEB_0001.15"]
    title: Coverage badge appears on children of selected composite
    verification: automated-test
    description: |
      GIVEN a composite recipe is selected
      WHEN the tree grid renders
      THEN child recipes of the composite display a "covered" badge
    revision: "0.1.0"

  - id: SVC_WEB_0001.25
    requirement_ids: ["WEB_0001.15"]
    title: Coverage badge disappears when composite is deselected
    verification: automated-test
    description: |
      GIVEN a composite recipe was selected (children showing "covered" badge)
      WHEN the composite is deselected
      THEN the "covered" badge is removed from all children
    revision: "0.1.0"

  - id: SVC_WEB_0001.26
    requirement_ids: ["WEB_0001.16"]
    title: Detail panel shows included-in section for child recipes
    verification: automated-test
    description: |
      GIVEN a recipe that is a child of one or more composite recipes
      WHEN the recipe is selected for detail view
      THEN the detail panel shows "Included in: X, Y" listing the parent composites
    revision: "0.1.0"

  - id: SVC_WEB_0001.27
    requirement_ids: ["WEB_0001.16"]
    title: Detail panel omits included-in for top-level recipes
    verification: automated-test
    description: |
      GIVEN a recipe that is not a child of any composite
      WHEN the recipe is selected for detail view
      THEN the detail panel does not show an "Included in" section
    revision: "0.1.0"

  - id: SVC_CORE_0001
    requirement_ids: ["CORE_0001"]
    title: Discover all recipes from classpath
    verification: automated-test
    description: |
      GIVEN the tool has recipe modules on its classpath
      WHEN the RecipeDiscoveryService scans the classpath
      THEN all recipes from all modules are returned with name and description
    revision: "0.1.0"

  - id: SVC_CORE_0001.1
    requirement_ids: ["CORE_0001.1"]
    title: Discover composite recipe structure
    verification: automated-test
    description: |
      GIVEN the classpath contains composite OpenRewrite recipes
      WHEN the RecipeDiscoveryService discovers recipes
      THEN composite recipes expose their sub-recipe list via recipeList
    revision: "0.1.0"

  - id: SVC_CORE_0002
    requirement_ids: ["CORE_0002"]
    title: Search recipes by keyword
    verification: automated-test
    description: |
      GIVEN the recipe catalog contains recipes
      WHEN the user searches for "spring boot"
      THEN only recipes matching "spring boot" in name or description are returned
    revision: "0.1.0"

  - id: SVC_CORE_0003
    requirement_ids: ["CORE_0003"]
    title: Execute recipe against project
    verification: automated-test
    description: |
      GIVEN a Gradle project with Java sources
      WHEN the user runs RemoveUnusedImports recipe
      THEN unused imports are removed from all Java files
    revision: "0.1.0"

  - id: SVC_CORE_0003.1
    requirement_ids: ["CORE_0003.1"]
    title: Parse multi-file-type project sources
    verification: automated-test
    description: |
      GIVEN a project with Java, XML, YAML, JSON, and properties files
      WHEN the ProjectSourceParser parses the project
      THEN all file types are parsed into OpenRewrite SourceFile objects
    revision: "0.1.0"

  - id: SVC_CORE_0004
    requirement_ids: ["CORE_0004"]
    title: Auto-detect build system and select scanner
    verification: automated-test
    description: |
      GIVEN a project directory
      WHEN ProjectScannerFactory.detect() is called
      THEN the appropriate ProjectScanner implementation is returned
      OR an IllegalArgumentException is thrown when no recognized build files are found
    revision: "0.1.0"

  - id: SVC_CORE_0004.1
    requirement_ids: ["CORE_0004"]
    title: Factory returns GradleProjectScanner for Gradle project
    verification: automated-test
    description: |
      GIVEN a directory containing Gradle build files (settings.gradle or build.gradle variants)
      WHEN ProjectScannerFactory.detect() is called
      THEN a GradleProjectScanner instance is returned
    revision: "0.1.0"

  - id: SVC_CORE_0004.2
    requirement_ids: ["CORE_0004"]
    title: Factory returns MavenProjectScanner for Maven project
    verification: automated-test
    description: |
      GIVEN a directory containing pom.xml
      WHEN ProjectScannerFactory.detect() is called
      THEN a MavenProjectScanner instance is returned
    revision: "0.1.0"

  - id: SVC_CORE_0004.3
    requirement_ids: ["CORE_0004"]
    title: Factory throws for unknown build system
    verification: automated-test
    description: |
      GIVEN a directory with no recognized build files (no pom.xml, no Gradle files)
      WHEN ProjectScannerFactory.detect() is called
      THEN an IllegalArgumentException is thrown with a descriptive message
    revision: "0.1.0"

  - id: SVC_CORE_GRADLE_0001
    requirement_ids: ["CORE_GRADLE_0001"]
    title: Resolve Gradle classpath via Tooling API
    verification: automated-test
    description: |
      GIVEN a Gradle project with dependencies
      WHEN the GradleProjectScanner scans the project
      THEN compile classpath JAR paths and source directories are returned
    revision: "0.1.0"

  - id: SVC_CORE_MAVEN_0001
    requirement_ids: ["CORE_MAVEN_0001"]
    title: Resolve Maven classpath via pom.xml
    verification: automated-test
    description: |
      GIVEN a Maven project with dependencies
      WHEN the MavenProjectScanner scans the project
      THEN compile classpath JAR paths and source directories are returned
    revision: "0.1.0"

  - id: SVC_CORE_0004.4
    requirement_ids: ["CORE_0004"]
    title: SessionHolder stores and returns projectDir and ProjectInfo
    verification: automated-test
    description: |
      GIVEN SessionHolder.init() has been called with a project directory and ProjectInfo
      WHEN getProjectDir() and getProjectInfo() are called
      THEN the stored values are returned; before init(), projectDir defaults to "." and projectInfo is null
    revision: "0.1.0"

  - id: SVC_CORE_0007
    requirement_ids: ["CORE_0007"]
    title: Save run configuration
    verification: automated-test
    description: |
      GIVEN the user has selected recipes and options
      WHEN they invoke config save
      THEN a .atunko.yml file is written with the recipe setup
    revision: "0.1.0"

  - id: SVC_CORE_0008
    requirement_ids: ["CORE_0008"]
    title: Load and execute from saved config
    verification: automated-test
    description: |
      GIVEN a valid .atunko.yml file exists
      WHEN the user runs with --config .atunko.yml
      THEN the saved recipes are executed with the saved options
    revision: "0.1.0"

  - id: SVC_TUI_0001
    requirement_ids: ["TUI_0001"]
    title: Launch TUI via subcommand
    verification: automated-test
    description: |
      GIVEN the user runs `atunko tui`
      WHEN the application starts
      THEN the TUI controller is initialized and launched
    revision: "0.2.0"

  - id: SVC_TUI_0001.1
    requirement_ids: ["TUI_0001.1"]
    title: TUI displays recipe table
    verification: automated-test
    description: |
      GIVEN the TUI is launched with recipes on classpath
      WHEN the browser view renders
      THEN a scrollable table shows each recipe with name, description, and tags
    revision: "0.1.0"

  - id: SVC_TUI_0001.2
    requirement_ids: ["TUI_0001.2"]
    title: TUI shows recipe detail panel
    verification: automated-test
    description: |
      GIVEN the recipe table is displayed
      WHEN the user highlights a recipe row
      THEN a side panel shows the recipe's full description, tags, and options
    revision: "0.1.0"

  - id: SVC_TUI_0001.3
    requirement_ids: ["TUI_0001.3"]
    title: TUI filters recipes by search
    verification: automated-test
    description: |
      GIVEN the recipe table is displayed with multiple recipes
      WHEN the user types a search query
      THEN only recipes matching the query in name, description, or tags are shown
    revision: "0.1.0"

  - id: SVC_TUI_0001.4
    requirement_ids: ["TUI_0001.4"]
    title: TUI shows full recipe detail view
    verification: automated-test
    description: |
      GIVEN a recipe is highlighted in the table
      WHEN the user presses Enter
      THEN a full-screen detail view shows the recipe's complete information
    revision: "0.1.0"

  - id: SVC_TUI_0001.5
    requirement_ids: ["TUI_0001.5"]
    title: TUI supports multi-select
    verification: automated-test
    description: |
      GIVEN the recipe table is displayed
      WHEN the user toggles selection on multiple recipes
      THEN the selected recipes are tracked and visually indicated
    revision: "0.1.0"

  - id: SVC_TUI_0001.6
    requirement_ids: ["TUI_0001.6"]
    title: TUI sorts recipes
    verification: automated-test
    description: |
      GIVEN the recipe table is displayed
      WHEN the user changes sort order to name or tags
      THEN the recipe list is reordered accordingly
    revision: "0.1.0"

  - id: SVC_TUI_0001.7
    requirement_ids: ["TUI_0001.7"]
    title: TUI configures recipe options
    verification: automated-test
    description: |
      GIVEN a recipe with configurable options is selected
      WHEN the user opens the options editor
      THEN the recipe's options are displayed and editable
    revision: "0.1.0"

  - id: SVC_TUI_0001.8
    requirement_ids: ["TUI_0001.8"]
    title: TUI shows dry-run preview
    verification: automated-test
    description: |
      GIVEN one or more recipes are selected
      WHEN the user initiates a dry run
      THEN a preview of affected files and changes is displayed without modifying files
    revision: "0.1.0"

  - id: SVC_TUI_0001.9
    requirement_ids: ["TUI_0001.9"]
    title: TUI executes recipes
    verification: automated-test
    description: |
      GIVEN one or more recipes are selected
      WHEN the user confirms execution
      THEN the recipes are applied and results are displayed
    revision: "0.1.0"

  - id: SVC_TUI_0001.10
    requirement_ids: ["TUI_0001.10"]
    title: TUI saves run configuration
    verification: automated-test
    description: |
      GIVEN one or more recipes are selected with options configured
      WHEN the user saves the run configuration
      THEN an .atunko.yml file is written with the current setup
    revision: "0.1.0"

  - id: SVC_TUI_0001.11
    requirement_ids: ["TUI_0001.11"]
    title: TUI provides tag browser
    verification: automated-test
    description: |
      GIVEN recipes with tags are available
      WHEN the user opens the tag browser
      THEN tags are listed and selecting a tag filters the recipe table
    revision: "0.1.0"

  - id: SVC_TUI_0001.12
    requirement_ids: ["TUI_0001.12"]
    title: TUI supports keyboard navigation
    verification: automated-test
    description: |
      GIVEN the TUI is displayed
      WHEN the user uses arrow keys, Tab, Enter, and shortcut keys
      THEN focus moves between elements and actions are triggered as expected
    revision: "0.1.0"

  - id: SVC_TUI_0001.13
    requirement_ids: ["TUI_0001.13"]
    title: Browse composite recipes with expand/collapse
    verification: automated-test
    description: |
      GIVEN the TUI displays composite recipes
      WHEN the user expands a composite recipe
      THEN the sub-recipes are displayed below the parent with collapse support
    revision: "0.1.0"

  - id: SVC_TUI_0001.14
    requirement_ids: ["TUI_0001.14"]
    title: Run dialog with reorder and toggle
    verification: automated-test
    description: |
      GIVEN the run dialog is open with selected recipes
      WHEN the user reorders, toggles, or cycles selection
      THEN the execution order and selection state update accordingly
    revision: "0.1.0"

  - id: SVC_TUI_0001.15
    requirement_ids: ["TUI_0001.15"]
    title: Debug logging to file
    verification: automated-test
    description: |
      GIVEN the TUI is launched with --log-file option
      WHEN TUI actions are performed
      THEN debug output is written to the specified log file
    revision: "0.1.0"

  - id: SVC_TUI_0001.16
    requirement_ids: ["TUI_0001.16"]
    title: Display recipe coverage indicators
    verification: automated-test
    description: |
      GIVEN a composite recipe is selected
      WHEN its sub-recipes appear in the recipe list
      THEN they are visually marked as covered by the composite
    revision: "0.1.0"

  - id: SVC_TUI_0001.16.1
    requirement_ids: ["TUI_0001.16"]
    title: Recursively compute covered recipes
    verification: automated-test
    description: |
      GIVEN a composite with nested composites is selected
      WHEN coveredRecipes is computed
      THEN all sub-recipes at every nesting level are included
    revision: "0.1.0"

  - id: SVC_TUI_0001.16.2
    requirement_ids: ["TUI_0001.16"]
    title: Show which composites include a recipe
    verification: automated-test
    description: |
      GIVEN a recipe is covered by one or more selected composites
      WHEN the user highlights that recipe
      THEN the detail panel shows which composites include it
    revision: "0.1.0"

  - id: SVC_TUI_0001.17
    requirement_ids: ["TUI_0001.17"]
    title: Selecting composite selects all transitive sub-recipes
    verification: automated-test
    description: |
      GIVEN the TUI browser displays a composite recipe with sub-recipes
      WHEN the user toggles selection on the composite
      THEN the composite and all its transitive sub-recipes become selected
    revision: "0.1.0"

  - id: SVC_TUI_0001.17.1
    requirement_ids: ["TUI_0001.17"]
    title: Selecting all sub-recipes auto-selects the parent composite
    verification: automated-test
    description: |
      GIVEN a composite recipe is unselected and all its sub-recipes are unselected
      WHEN the user individually selects every sub-recipe of the composite
      THEN the composite is automatically added to the selected set
    revision: "0.1.0"

  - id: SVC_TUI_0001.17.2
    requirement_ids: ["TUI_0001.17"]
    title: Deselecting all sub-recipes deselects the parent composite
    verification: automated-test
    description: |
      GIVEN a composite recipe is selected along with all its sub-recipes
      WHEN the user toggles selection off the composite
      THEN the composite and all its transitive sub-recipes are deselected
    revision: "0.1.0"

  - id: SVC_TUI_0001.17.3
    requirement_ids: ["TUI_0001.17"]
    title: Partial child selection renders composite as indeterminate
    verification: automated-test
    description: |
      GIVEN a composite recipe with multiple sub-recipes
      WHEN only some (but not all) sub-recipes are selected
      THEN the composite is tracked in the partial (indeterminate) set and rendered with an indeterminate indicator
    revision: "0.1.0"

  - id: SVC_TUI_0001.18
    requirement_ids: ["TUI_0001.18"]
    title: Default theme is dark
    verification: automated-test
    description: |
      GIVEN the TUI is launched without specifying a theme
      WHEN no --theme flag or --css-file flag is provided
      THEN the dark theme stylesheet is loaded from bundled resources
    revision: "0.1.0"

  - id: SVC_TUI_0001.18.1
    requirement_ids: ["TUI_0001.18"]
    title: Light theme via --theme flag
    verification: automated-test
    description: |
      GIVEN the TUI is launched with --theme light
      WHEN the StyleEngine is initialized
      THEN the light theme stylesheet is loaded from bundled resources
    revision: "0.1.0"

  - id: SVC_TUI_0001.18.2
    requirement_ids: ["TUI_0001.18"]
    title: User CSS file via --css-file flag
    verification: automated-test
    description: |
      GIVEN the TUI is launched with --css-file pointing to a valid TCSS file
      WHEN the StyleEngine is initialized
      THEN the user-provided CSS file is loaded and replaces the bundled theme
    revision: "0.1.0"

  - id: SVC_TUI_0001.18.3
    requirement_ids: ["TUI_0001.18"]
    title: XDG config CSS auto-loaded
    verification: automated-test
    description: |
      GIVEN ~/.config/atunko/theme.tcss exists and no --css-file flag is specified
      WHEN the TUI is launched
      THEN the XDG config CSS file is loaded and replaces the bundled theme
    revision: "0.1.0"

  - id: SVC_TUI_0001.18.4
    requirement_ids: ["TUI_0001.18"]
    title: Theme flag selects bundled theme
    verification: automated-test
    description: |
      GIVEN the TUI is launched with --theme dark or --theme light
      WHEN the StyleEngine is initialized
