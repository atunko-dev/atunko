schema: spec-driven

context: |
  Tech stack: Java 25, Gradle 9.x (Groovy DSL), Picocli, TamboUI, OpenRewrite
  We use conventional commits
  TDD: tests before implementation
  Domain: Developer tooling — OpenRewrite recipe discovery, execution, and configuration
  Architecture: Multi-module Gradle (atunko-cli + atunko-tui + atunko-core). Core has no UI dependencies.
  reqstool is SSOT for requirements and SVCs — see docs/reqstool/
  License: Apache 2.0

rules:
  proposal:
    - Reference reqstool requirement IDs (CORE_xxxx, CLI_xxxx, TUI_xxxx) when applicable
    - Keep proposals focused on a single capability
  specs:
    - "reqstool is SSOT: NEVER duplicate requirement text or GIVEN/WHEN/THEN scenarios"
    - "Follow conventions in .claude/reqstool-openspec-conventions.md"
    - "Use ### Requirement: <ID> with 'The system SHALL implement <ID>.'"
    - "Use #### Scenario: <SVC_ID> with 'The system SHALL pass <SVC_ID>.'"
    - "IDs only — no file paths. Use reqstool CLI to look up details."
    - "Validate with: openspec validate --all --strict"
  tasks:
    - Each task should be testable independently
    - Include the reqstool SVC IDs that the task covers
